<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Episodio — Atlas · Zenoxia</title>
  
  <link rel="stylesheet" href="design-tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
  <body>
    <div class="meta">
      <div class="logo">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H7v-2h4V6h2v4h4v2h-4v4z"
          />
        </svg>
      </div>
      <div>
        <div class="meta-title">Atlas · Zenoxia</div>
        <div class="meta-sub">Mapa de camas · Panel operativo</div>
      </div>
      <div class="slabel">
        Conecta con el backend: checklist y notas reales.
      </div>
    </div>

    <div class="shell">
      <div class="topbar">
        <div class="tb-left">
          <div
            class="logo"
            style="width: 24px; height: 24px; border-radius: 6px"
          >
            <svg
              viewBox="0 0 24 24"
              style="width: 13px; height: 13px; fill: #fff"
            >
              <path
                d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H7v-2h4V6h2v4h4v2h-4v4z"
              />
            </svg>
          </div>
          <div>
            <div class="tb-name">Tablero de camas</div>
            <div class="tb-role">Full stack operativo</div>
          </div>
        </div>
        <div
          class="tb-right"
          style="
            display: flex;
            align-items: flex-end;
            gap: 12px;
            width: 100%;
            justify-content: flex-end;
            flex-wrap: wrap;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 4px;
              min-width: 180px;
            "
          >
            <label class="field-lbl" for="role-select">Rol operativo</label>
            <select id="rol-select" class="field-sel"></select>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 4px;
              min-width: 180px;
            "
          >
            <label class="field-lbl" for="actor-nombre">Actor</label>
            <input
              id="actor-nombre"
              class="field-sel"
              type="text"
              placeholder="Ej.: Lic. Morales"
            />
          </div>
          <button id="btn-refresh" class="btn btn-primary" type="button">
            Actualizar
          </button>
        </div>
      </div>

      <div class="map-area" style="margin-top: 20px">
        <div class="map-hint" style="margin-bottom: 16px">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4M12 8h.01" />
          </svg>
          <strong>Atlas Full Stack:</strong> datos reales cargados desde la API
          del backend.
        </div>
        <div id="resumen" class="summary-panel"></div>
        <div id="board" class="map-area"></div>
      </div>
    </div>

    <div id="drawer-host"></div>
    <div id="toast-host"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
